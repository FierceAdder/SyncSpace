<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SyncSpace — Share, discover, and learn together. A collaborative resource-sharing platform for study groups." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>" />
    <title>SyncSpace — Share. Discover. Learn Together.</title>
    <!-- Blocking theme script: runs before React, eliminates flash of wrong theme -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('syncspace_theme');
          var theme = saved
            ? saved
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
